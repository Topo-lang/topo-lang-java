# Gradle build performance — applies to every invocation of this subproject's
# `./gradlew`, whether driven by CMake (topo-jvm/CMakeLists.txt) or by hand.
#
# These six Topo Gradle roots historically dropped `--no-daemon` on the CMake
# side after a long-fixed Topo core memory-leak made the persistent daemon
# unsafe. With that gone, the daemon is the single biggest speed-up: 5 of the
# 6 invocations during a clean build reuse a warm JVM instead of paying ~1 s
# of cold-start per JAR.
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.workers.max=4
org.gradle.jvmargs=-Xmx2g
