name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs on the same ref when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin the upstream topo-core / topo-lang refs this build is tested against.
  # Bump whenever a new compatible tag ships. TOPO_CLI_REF pins the
  # downstream topo-cli checkout the verify-l2 job builds for its
  # TopoCheckRunner export (checker-e2e suite link dependency).
  TOPO_CORE_REF: main
  TOPO_LANG_REF: main
  TOPO_CLI_REF: main

jobs:
  build-and-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    steps:
      - uses: actions/checkout@v5

      - name: Install build deps (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ninja-build

      - name: Install build deps (macos)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Set up JDK 17 (for the optional real-javac roundtrip suite)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Export GHA cache env (for vcpkg x-gha backend)
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          # Matches the `builtin-baseline` pinned in vcpkg.json. Bump both
          # together when refreshing the vcpkg snapshot.
          vcpkgGitCommitId: "56bb2411609227288b70117ead2c47585ba07713"

      # Cache the upstream Topo install (topo-core + topo-lang) so PRs
      # don't re-build them every time. Keyed on the two pinned refs so
      # bumping invalidates the cache.
      - name: Cache upstream topo install
        id: topo-cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/topo-install
          key: topo-core-${{ env.TOPO_CORE_REF }}-lang-${{ env.TOPO_LANG_REF }}-${{ matrix.os }}-v2

      - name: Build & install topo-core (zero-LLVM, lang-less)
        if: steps.topo-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "${TOPO_CORE_REF}" \
              https://github.com/topo-lang/topo-core.git \
              "${RUNNER_TEMP}/topo-core-src"
          cmake -S "${RUNNER_TEMP}/topo-core-src" \
                -B "${RUNNER_TEMP}/topo-core-build" \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX="${RUNNER_TEMP}/topo-install" \
                -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
                -DTOPO_ENABLE_LLVM=OFF
          cmake --build "${RUNNER_TEMP}/topo-core-build" --target install

      - name: Build & install topo-lang
        if: steps.topo-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "${TOPO_LANG_REF}" \
              https://github.com/topo-lang/topo-lang.git \
              "${RUNNER_TEMP}/topo-lang-src"
          cmake -S "${RUNNER_TEMP}/topo-lang-src" \
                -B "${RUNNER_TEMP}/topo-lang-build" \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX="${RUNNER_TEMP}/topo-install" \
                -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/topo-install" \
                -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
          cmake --build "${RUNNER_TEMP}/topo-lang-build" --target install

      # Re-install topo-core to flip TOPO_CORE_WITH_LANG ON now that
      # topo-lang is discoverable in the prefix. This wires lib/Build +
      # lib/Transpile into the topo-core install set.
      - name: Re-install topo-core (with-lang)
        if: steps.topo-cache.outputs.cache-hit != 'true'
        run: |
          cmake -S "${RUNNER_TEMP}/topo-core-src" \
                -B "${RUNNER_TEMP}/topo-core-build" \
                -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/topo-install"
          cmake --build "${RUNNER_TEMP}/topo-core-build" --target install

      - name: Configure topo-lang-java
        run: |
          cmake -S . -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/topo-install" \
              -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
              -DTOPO_LANG_JAVA_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 120

      # Smoke test: install topo-lang-java, then verify a downstream
      # find_package(topo-lang-java CONFIG REQUIRED) resolves and links
      # cleanly against the topo::lang-java::TopoJavaAnalysis target.
      - name: Install topo-lang-java
        run: cmake --install build --prefix "${RUNNER_TEMP}/lang-java-install"

      - name: find_package smoke
        run: |
          mkdir -p "${RUNNER_TEMP}/find-package-smoke"
          cd "${RUNNER_TEMP}/find-package-smoke"
          cat > vcpkg.json <<'JSON'
          {
            "name": "topo-lang-java-smoke",
            "version-string": "0.0.1",
            "builtin-baseline": "56bb2411609227288b70117ead2c47585ba07713",
            "dependencies": ["nlohmann-json", "tomlplusplus"]
          }
          JSON
          cat > CMakeLists.txt <<'CMAKE'
          cmake_minimum_required(VERSION 3.20)
          project(lang-java-find-package-smoke LANGUAGES CXX)
          set(CMAKE_CXX_STANDARD 17)
          find_package(topo-lang-java CONFIG REQUIRED)
          add_executable(smoke smoke.cpp)
          target_link_libraries(smoke PRIVATE topo::lang-java::TopoJavaAnalysis)
          if(MINGW)
              target_link_options(smoke PRIVATE -static -static-libgcc -static-libstdc++)
          endif()
          CMAKE
          cat > smoke.cpp <<'CPP'
          #include "stub/JavaStubGenerator.h"
          #include <cstdio>
          #include <string>
          int main() {
              const std::string src =
                  "class C {\n  int add(int a, int b) { return a + b; }\n}\n";
              const size_t pos = topo::check::JavaStubGenerator::findMethodBodyStart(src, "add");
              if (pos == std::string::npos || src[pos] != '{') return 1;
              std::printf("topo-lang-java find_package OK: body opens at %zu\n", pos);
              return 0;
          }
          CPP
          cmake -S . -B build -G Ninja \
              -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/lang-java-install;${RUNNER_TEMP}/topo-install" \
              -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
          cmake --build build
          ./build/smoke

  # ── Checker-e2e + L2 deep-containment verify (jdtls) ─────────────
  # build-and-test (above) never builds the checker-e2e suite: it links
  # TopoCheckRunner, exported by topo-cli — a package downstream of this
  # one — so the default matrix carries no reason to build it. This job
  # adds that surface on one platform: topo-cli's only upstreams
  # (topo-core + topo-lang) are the same prefix the default job already
  # builds, so one extra build+install step unlocks the suite. jdtls is
  # installed so the JavaContainmentL2 deep cases RUN instead of
  # GTEST_SKIP (a skip is not a pass); the final step re-runs the suite
  # and converts any skip into a hard failure, mirroring the
  # all-skip→fail guard in topo-lsp's CI and the clangd arrangement in
  # topo-lang-cpp's verify-llvm job.
  verify-l2:
    name: verify (checker e2e + jdtls L2) (ubuntu-24.04)
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - name: Install build deps (linux)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ninja-build

      - name: Set up JDK 17 (jdtls launch + real-javac roundtrip suite)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # jdtls (Eclipse JDT Language Server) — no apt package; use a PINNED
      # milestone tarball (the -latest snapshot is a moving, unverifiable
      # input), verified against its published SHA-256 BEFORE extraction,
      # downloaded to an unpredictable mktemp path. Bump both values
      # together; the .sha256 lives next to the tarball:
      # https://download.eclipse.org/jdtls/milestones/1.58.0/
      # Mirrors the recipe topo-lsp's CI proves on this exact runner image.
      - name: Install jdtls (pinned milestone, sha256-verified)
        run: |
          set -euo pipefail
          JDTLS_URL="https://download.eclipse.org/jdtls/milestones/1.58.0/jdt-language-server-1.58.0-202604151538.tar.gz"
          JDTLS_SHA256="2a5bbe55ec91b4325392050dc422cead3220a2459b3766be35e1fff45b4a50d9"
          jdtls_tmp="$(mktemp -d)"
          curl -fsSL -o "${jdtls_tmp}/jdtls.tar.gz" "${JDTLS_URL}"
          echo "${JDTLS_SHA256}  ${jdtls_tmp}/jdtls.tar.gz" | sha256sum -c -
          mkdir -p "${HOME}/jdtls"
          tar -xzf "${jdtls_tmp}/jdtls.tar.gz" -C "${HOME}/jdtls"
          rm -rf "${jdtls_tmp}"
          printf '#!/usr/bin/env bash\nexec python3 "%s/bin/jdtls" "$@"\n' "${HOME}/jdtls" \
            | sudo tee /usr/local/bin/jdtls >/dev/null
          sudo chmod +x /usr/local/bin/jdtls
          command -v jdtls

      - name: Export GHA cache env (for vcpkg x-gha backend)
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "56bb2411609227288b70117ead2c47585ba07713"

      # Same key as build-and-test's ubuntu leg — this job consumes the
      # identical upstream install (topo-cli goes to a separate, uncached
      # prefix below, so the cached content is unchanged).
      - name: Cache upstream topo install
        id: topo-cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/topo-install
          key: topo-core-${{ env.TOPO_CORE_REF }}-lang-${{ env.TOPO_LANG_REF }}-ubuntu-24.04-v2

      - name: Build & install topo-core (zero-LLVM, lang-less)
        if: steps.topo-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "${TOPO_CORE_REF}" \
              https://github.com/topo-lang/topo-core.git \
              "${RUNNER_TEMP}/topo-core-src"
          cmake -S "${RUNNER_TEMP}/topo-core-src" \
                -B "${RUNNER_TEMP}/topo-core-build" \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX="${RUNNER_TEMP}/topo-install" \
                -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
                -DTOPO_ENABLE_LLVM=OFF
          cmake --build "${RUNNER_TEMP}/topo-core-build" --target install

      - name: Build & install topo-lang
        if: steps.topo-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "${TOPO_LANG_REF}" \
              https://github.com/topo-lang/topo-lang.git \
              "${RUNNER_TEMP}/topo-lang-src"
          cmake -S "${RUNNER_TEMP}/topo-lang-src" \
                -B "${RUNNER_TEMP}/topo-lang-build" \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX="${RUNNER_TEMP}/topo-install" \
                -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/topo-install" \
                -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
          cmake --build "${RUNNER_TEMP}/topo-lang-build" --target install

      - name: Re-install topo-core (with-lang)
        if: steps.topo-cache.outputs.cache-hit != 'true'
        run: |
          cmake -S "${RUNNER_TEMP}/topo-core-src" \
                -B "${RUNNER_TEMP}/topo-core-build" \
                -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/topo-install"
          cmake --build "${RUNNER_TEMP}/topo-core-build" --target install

      # Uncached on purpose: topo-cli is a thin router + small static lib
      # (minutes to build with the vcpkg binary cache), and an always-fresh
      # build tracks its main without a second cache key to bump. Plugins
      # auto-detect to OFF (none on this prefix) — the checker-e2e suite
      # links only the TopoCheckRunner static lib and registers this repo's
      # plugin itself via TestMain. Profile CLI off: it would pull topo-v8
      # into the installed config's find_dependency chain.
      - name: Build & install topo-cli (TopoCheckRunner export)
        run: |
          git clone --depth 1 --branch "${TOPO_CLI_REF}" \
              https://github.com/topo-lang/topo-cli.git \
              "${RUNNER_TEMP}/topo-cli-src"
          cmake -S "${RUNNER_TEMP}/topo-cli-src" \
                -B "${RUNNER_TEMP}/topo-cli-build" \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX="${RUNNER_TEMP}/topo-cli-install" \
                -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/topo-install" \
                -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
                -DTOPO_CLI_ENABLE_PROFILE=OFF
          cmake --build "${RUNNER_TEMP}/topo-cli-build" --target install

      - name: Configure topo-lang-java (tests ON, topo-cli on the prefix)
        run: |
          cmake -S . -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/topo-install;${RUNNER_TEMP}/topo-cli-install" \
              -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
              -DTOPO_LANG_JAVA_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Run checker-e2e suite
        run: |
          # --no-tests=error: if the topo-cli gate silently failed and the
          # checker suite was never registered, the job FAILS rather than
          # greening on zero tests.
          ctest --test-dir build -L checker --output-on-failure --timeout 180 --no-tests=error

      # The checker suite passes ctest even when its gtest cases
      # GTEST_SKIP() (jdtls absent) — "Passed" can mean "every L2 case
      # skipped". Re-run the binary and FAIL on any skip or zero passes,
      # converting a silent all-skip into a hard failure (skip != pass).
      - name: Assert L2 deep containment ran (skip != pass)
        run: |
          # set +e: handle errors explicitly — a grep no-match inside a
          # command substitution would otherwise abort the step silently.
          set +e
          exe=$(find build -type f -name "topo-lang-java-check-tests" 2>/dev/null | head -1)
          if [ -z "${exe}" ]; then
            echo "::error::topo-lang-java-check-tests not built — topo-cli prefix missing at configure time?"; exit 1
          fi
          out=$("${exe}" 2>&1); rc=$?
          printf '%s\n' "${out}" | tail -20
          passed=$(printf '%s\n' "${out}" | grep -oE '\[  PASSED  \] [0-9]+ test' | grep -oE '[0-9]+' | tail -1)
          skipped=$(printf '%s\n' "${out}" | grep -oE '\[  SKIPPED \] [0-9]+ test' | grep -oE '[0-9]+' | tail -1)
          [ -z "${passed}" ] && passed=0
          [ -z "${skipped}" ] && skipped=0
          echo "topo-lang-java-check-tests: ${passed} PASSED, ${skipped} skipped (exit ${rc})"
          if [ "${rc}" -ne 0 ]; then
            echo "::error::checker-e2e suite failed (exit ${rc})"; exit 1
          fi
          if [ "${skipped}" -gt 0 ] || [ "${passed}" -lt 1 ]; then
            echo "::error::L2 deep containment did not RUN (jdtls missing → GTEST_SKIP; skip != pass)"; exit 1
          fi
