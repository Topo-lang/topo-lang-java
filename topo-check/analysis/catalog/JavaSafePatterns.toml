# topo-lang-java/topo-check/analysis/catalog/JavaSafePatterns.toml
# Java safety patterns whitelist -- community-maintained
# Non-external functions may only use listed patterns.
# Unlisted = unsafe by default.

[version]
schema = 1

# Safe Java language constructs
[constructs]
safe = [
    "if", "else", "for", "while", "do", "switch", "case", "default",
    "break", "continue", "return",
    "try", "catch", "throw", "finally",
    "class", "interface", "enum", "record",
    "sealed", "permits", "non-sealed",
    "extends", "implements", "super", "this",
    "new", "instanceof", "var",
    "final", "static", "abstract",
    "synchronized", "volatile",
    "public", "protected", "private",
    "void", "boolean", "byte", "short", "int", "long",
    "float", "double", "char",
    "import", "package",
    "assert",
    "yield",
    "null", "true", "false",
]

unsafe = [
    "native",
    "sun.misc.Unsafe",
]

# Safe java.* symbols (for L2 LSP-resolved names)
# Uses :: as separator (Topo internal convention).
[stdlib]
